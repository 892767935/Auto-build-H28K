name: Auto-build-H28K

# 仅手动触发，修改配置/脚本提交代码不会自动编译
on:
  workflow_dispatch:

# 授予仓库写入权限，用于创建Tag、Release、上传固件
permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  # Git Tag合法时间戳，下划线替代冒号，解决发布校验失败
  BUILD_SAFE: ${{ github.run_number }}-$(date +%Y%m%d_%H_%M)
  # Release标题展示用完整时分时间，仅展示不用于Tag
  BUILD_RAW: ${{ github.run_number }}-$(date +%Y%m%d-%H:%M)
  # Flippy F大RK3568 OpenWrt源码地址
  FLIPPY_REPO: https://github.com/flippy/openwrt-flippy.git
  TARGET_DEV: h28k

jobs:
  build_h28k:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取仓库配置、DIY脚本、自定义files文件
        uses: actions/checkout@v4

      - name: 清理系统冗余，释放磁盘空间
        run: |
          sudo apt remove -y docker.io containerd runc || true
          sudo apt autoremove -y
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          df -h

      - name: 设置上海时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          echo "TERM=xterm" >> $GITHUB_ENV

      - name: 安装F大源码全套编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison gawk libncurses-dev libssl-dev python3 python3-pip git libelf-dev python3-pyelftools unzip zip aria2 dos2unix curl wget rsync

      - name: 缓存OpenWrt源码与dl下载目录，二次编译加速
        uses: actions/cache@v4
        with:
          path: openwrt
          key: flippy-h28k-${{ github.sha }}
          restore-keys: flippy-h28k-

      - name: 克隆/更新Flippy RK3528源码
        run: |
          # 关闭Git账号弹窗，解决 Username 读取报错
          git config --global core.askpass ""
          if [ ! -d openwrt ]; then
            # ghproxy镜像加速，解决github访问失败
            git clone --depth=1 https://mirror.ghproxy.com/https://github.com/flippy/openwrt-flippy.git openwrt
          fi
          cd openwrt
          git pull --depth=1

      - name: 校验必需配置文件与DIY脚本
        run: |
          if [ ! -f configs/${{ env.TARGET_DEV }}.config ]; then
            echo "【致命错误】缺失配置文件 configs/${{ env.TARGET_DEV }}.config"
            exit 1
          fi
          if [ ! -f diy-part1.sh ] || [ ! -f diy-part2.sh ]; then
            echo "【致命错误】缺失 diy-part1.sh / diy-part2.sh 插件脚本"
            exit 1
          fi

      - name: 导入编译配置、自定义文件、DIY脚本
        run: |
          cp configs/${{ env.TARGET_DEV }}.config openwrt/.config
          cp diy-part1.sh diy-part2.sh openwrt/
          [ -d files ] && cp -r files openwrt/

      - name: 执行 diy-part1.sh 拉取第三方插件/主题
        run: |
          cd openwrt
          chmod +x diy-part1.sh
          ./diy-part1.sh

      - name: 更新并安装feeds软件源
        run: |
          cd openwrt
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 执行 diy-part2.sh 调整代理、系统参数
        run: |
          cd openwrt
          chmod +x diy-part2.sh
          ./diy-part2.sh

      - name: make defconfig 同步编译配置
        run: |
          cd openwrt
          make defconfig

      - name: 预下载全部源码依赖包
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译H28K固件（减半线程防内存OOM）
        run: |
          cd openwrt
          make -j$(( $(nproc) / 2 )) V=s 2>&1 | tee ../build-${{ env.TARGET_DEV }}.log

      - name: 上传完整编译日志（排错使用）
        uses: actions/upload-artifact@v4
        with:
          name: build-log-h28k
          path: build-${{ env.TARGET_DEV }}.log

      - name: 提取全部H28K刷机镜像（factory全新包+sysupgrade升级包）
        run: |
          mkdir -p firmware/${{ env.TARGET_DEV }}
          cd openwrt
          echo "===== 检索RK3568 H28K固件 ====="
          find bin/targets/rockchip/rk3568 -name "*h28k*sysupgrade.img*" -o -name "*h28k*factory.img*"
          find bin/targets/rockchip/rk3568 -name "*h28k*sysupgrade.img*" -o -name "*h28k*factory.img*" -exec cp {} ../firmware/${{ env.TARGET_DEV }}/ \;
          echo "===== 已提取固件列表 ====="
          ls -la ../firmware/${{ env.TARGET_DEV }}/

      - name: 上传固件产物，供Release打包
        uses: actions/upload-artifact@v4
        with:
          name: firmware-h28k
          path: firmware/${{ env.TARGET_DEV }}/

  # 编译完成后自动打包、发布Release
  release_firmware:
    needs: build_h28k
    runs-on: ubuntu-22.04
    steps:
      - name: 下载全部编译固件文件
        uses: actions/download-artifact@v4
        with:
          path: ./temp_firmware

      - name: 批量打包固件（合集包+独立包+裸镜像）
        run: |
          mkdir release_dir
          cp -r temp_firmware/firmware-* release_dir/

          # 完整固件合集压缩包
          cd release_dir
          zip -r H28K_All_Firmware_${{ env.BUILD_SAFE }}.zip firmware-h28k/
          mv H28K_All_Firmware_${{ env.BUILD_SAFE }}.zip ../

          # 单设备独立压缩包
          zip -r ../H28K_Single_Pack_${{ env.BUILD_SAFE }}.zip firmware-h28k/

          # 提取原始img镜像到根目录，Release可直接下载裸文件
          find release_dir -type f -name "*.img" -o -name "*.img.gz" -exec cp {} ../ \;

      - name: 创建GitHub Release发布固件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: H28K_Build_${{ env.BUILD_SAFE }}
          name: Auto-build-H28K 编译固件 ${{ env.BUILD_RAW }}
          body: |
            ## 编译基础信息
            项目名称：Auto-build-H28K
            源码来源：Flippy F大 RK3568 OpenWrt
            运行编号：${{ github.run_number }}
            编译时间：${{ env.BUILD_RAW }}
            默认后台地址：192.168.1.10
            登录账号：root | 默认密码：password

            ## 适配设备
            通用普通版 H28K RK3568

            ## 预装内置组件
            - 完整中文LuCI界面 + Argon美化主题
            - OpenClash 全套依赖、Lucky轻量代理
            - UPnP端口转发、USB存储自动挂载
            - F2FS/EXT4文件系统、TCP BBR拥塞控制
            - htop、iperf3、磁盘工具、无线调试工具

            ## 文件下载说明
            1. H28K_All_Firmware_xxx.zip：完整固件合集包
            2. H28K_Single_Pack_xxx.zip：独立H28K固件压缩包
            3. *.img / *.img.gz：裸刷机镜像，无需解压直接写入U盘/硬盘
          files: |
            *.zip
            *.img
            *.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
